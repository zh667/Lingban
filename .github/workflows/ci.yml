name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Lingban.slnx

      - name: Build
        run: dotnet build Lingban.slnx --no-restore --configuration Release

      - name: Format check
        run: dotnet format Lingban.slnx --verify-no-changes --no-restore

      - name: Test
        run: dotnet test Lingban.slnx --no-build --configuration Release
